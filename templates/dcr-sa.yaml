apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "service_account.name" . | quote }}
  annotations:
{{ include "hooks.ressources" . | indent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "role.name" . | quote }}
  annotations:
{{ include "hooks.ressources" . | indent 4 }}
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["secrets"]
  verbs: ["get", "list", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dcr
  annotations:
{{ include "hooks.ressources" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "role.name" . | quote }}
subjects:
- kind: ServiceAccount
  name: {{ include "service_account.name" . | quote }}
