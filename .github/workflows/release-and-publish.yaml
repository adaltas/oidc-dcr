name: Release and publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please workflow
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  publish:
    name: Publish chart to Quay
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "latest"

      - name: Log in to Quay.io
        run: |
          echo "${{ secrets.QUAY_TOKEN }}" | helm registry login quay.io \
            --username "${{ secrets.QUAY_USERNAME }}" \
            --password-stdin

      - name: Update chart Version from tag
        run: |
          TAG_VERSION=$(echo "${{ needs.release-please.outputs.tag_name }}" | sed 's/^v//')
          echo "Updating Chart.yaml with version: $TAG_VERSION"
          yq -i ".version = \"$TAG_VERSION\"" Chart.yaml

      - name: Package Helm chart
        run: |
          helm package . --destination .dist

      - name: Push chart to Quay (OCI)
        run: |
          CHART_PACKAGE=$(ls .dist/*.tgz)
          helm push "$CHART_PACKAGE" oci://quay.io/adaltas
